<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor de archivos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .upload-box {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-box:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-box.dragover {
            border-color: #667eea;
            background: #e8ebff;
            transform: scale(1.02);
        }
        .file-item {
            background: #f5f5f5;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-size {
            font-size: 0.8em;
            color: #666;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .status.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }
        .progress-bar.active {
            display: block;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-btn:hover {
            background: #ff5252;
        }
        .url-info {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .url-info code {
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            word-break: break-all;
        }
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 12px;
        }
        .copy-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Enviar archivos al móvil</h1>

        <div class="url-info">
            <p style="margin-bottom: 10px; color: #666;">📱 Escanea este QR o accede a:</p>
            <code id="pageUrl">Cargando...</code>
            <button class="copy-btn" onclick="copyUrl()">Copiar</button>
            <div style="margin: 15px auto; width: 150px; height: 150px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 10px;">
                <span style="font-size: 0.8em; color: #666;">[QR Code]</span>
            </div>
        </div>

        <div class="upload-box" id="dropZone">
            <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
            <p><strong>Arrastra archivos aquí</strong></p>
            <p style="color: #666; font-size: 0.9em;">o haz clic para seleccionar</p>
            <input type="file" id="fileInput" multiple style="display: none;">
        </div>

        <div id="fileList"></div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <button class="btn" id="sendBtn" onclick="sendFiles()" disabled>
            📤 Enviar archivos
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        let selectedFiles = [];
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // Mostrar URL
        document.getElementById('pageUrl').textContent = window.location.href;

        function copyUrl() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                showStatus('URL copiada al portapapeles', 'info');
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = window.location.href;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showStatus('URL copiada al portapapeles', 'info');
            });
        }

        // Drag and drop
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const newFiles = Array.from(files);
            selectedFiles = [...selectedFiles, ...newFiles];
            updateUI();
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                sendBtn.disabled = true;
                return;
            }

            fileList.innerHTML = selectedFiles.map((file, index) => `
                <div class="file-item">
                    <div class="file-info">
                        <span>${getFileIcon(file.type)}</span>
                        <span>${file.name}</span>
                        <span class="file-size">(${(file.size / 1024).toFixed(1)} KB)</span>
                    </div>
                    <button class="delete-btn" onclick="removeFile(${index})">✖</button>
                </div>
            `).join('');

            sendBtn.disabled = false;
            hideStatus();
        }

        function getFileIcon(type) {
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📄';
            if (type.includes('zip') || type.includes('rar')) return '📦';
            return '📎';
        }

        async function sendFiles() {
            if (selectedFiles.length === 0) return;

            sendBtn.disabled = true;
            progressBar.classList.add('active');
            progressFill.style.width = '0%';

            try {
                const formData = new FormData();
                selectedFiles.forEach(file => {
                    formData.append('files', file);
                });

                // Simular progreso
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 10;
                    if (progress > 90) clearInterval(interval);
                    progressFill.style.width = Math.min(progress, 90) + '%';
                }, 200);

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                clearInterval(interval);
                progressFill.style.width = '100%';

                if (response.ok) {
                    const result = await response.json();
                    showStatus(`✅ ${result.message || 'Archivos enviados correctamente'}`, 'success');
                    
                    // Generar enlaces de descarga
                    if (result.files) {
                        const links = result.files.map(f => 
                            `<a href="/download/${f}" target="_blank">${f}</a>`
                        ).join(' | ');
                        statusDiv.innerHTML += `<br>📥 ${links}`;
                    }
                    
                    selectedFiles = [];
                    setTimeout(updateUI, 2000);
                } else {
                    throw new Error('Error al enviar');
                }
            } catch (error) {
                showStatus('❌ Error al enviar archivos. ' + error.message, 'error');
                // Fallback: compartir usando Web Share API
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Archivos compartidos',
                            files: selectedFiles
                        });
                        showStatus('✅ Archivos compartidos usando la API nativa', 'success');
                        selectedFiles = [];
                        setTimeout(updateUI, 2000);
                    } catch (shareError) {
                        if (shareError.name !== 'AbortError') {
                            console.error(shareError);
                        }
                    }
                }
            } finally {
                sendBtn.disabled = false;
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    progressFill.style.width = '0%';
                }, 3000);
            }
        }

        function showStatus(message, type = 'info') {
            statusDiv.className = 'status ' + type;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }

        function hideStatus() {
            statusDiv.style.display = 'none';
        }

        // Detectar si es móvil
        if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
            document.querySelector('h1').textContent = '📱 Recibe archivos';
            document.querySelector('.url-info').style.display = 'none';
        }
    </script>
</body>
</html>
